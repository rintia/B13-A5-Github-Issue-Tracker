<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <!-- DasiyUI & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-base-200 min-h-screen">

    <header>
        <!-- Navbar -->
        <nav class="">
            <div class="navbar bg-base-100 shadow-sm px-20">
                <div class="flex-1">
                  <a class="btn btn-ghost text-xl">
                    <img class="h-full" src="./assets/github-logo.png" alt="">
                    <h2>GitHub Issue Tracker</h2>
                  </a>
                </div>
                <div class="flex gap-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                          <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                          >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                          </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                      </label>
                  <div class="flex">
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                  </div>
                </div>
              </div>
        </nav>
    </header>

    <main class="max-w-[1140px] mx-auto">

        <!-- Category Buttons -->
        <section class="flex gap-5 bg-base-100 my-10 px-4 py-6 rounded-md shadow-sm">
            <button class="btn btn-primary">All</button>
            <button class="btn btn-primary">Open</button>
            <button class="btn btn-primary">Closed</button>
        </section>

        <!-- Issue Section -->

        <!-- Issue numbers -->
        <section class="px-4 py-6 bg-base-100 border-gray-400 border-b-2">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                   <img src="./assets/Aperture.png" alt=""> 
                    <div>
                        <h2 class="font-semibold text-2xl"><span>50</span> Issues</h2>
                        <p class="text-gray-600">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <p class="flex gap-1 items-center "><i class="fa-solid fa-circle text-[#00A96E] text-[0.5rem] "></i> Open</p>
                    <p class="flex gap-1 items-center "><i class="fa-solid fa-circle text-[#A855F7] text-[0.5rem] "></i> Closed</p>
                    
                </div>
            </div>
        </section>
        <!-- Issue Cards-->
        <section>
            
        </section>
    </main>



    <script src="./scripts/script.js"></script>
</body>

</html>
