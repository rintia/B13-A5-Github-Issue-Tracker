<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <!-- DasiyUI & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <header>
        <!-- Navbar -->
        <nav class="">
            <div class="navbar bg-base-100 shadow-sm px-20">
                <div class="flex-1">
                  <a class="btn btn-ghost text-xl">
                    <img class="h-full" src="./assets/github-logo.png" alt="">
                    <h2>GitHub Issue Tracker</h2>
                  </a>
                </div>
                <div class="flex gap-2">
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                          <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                          >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                          </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                      </label>
                  <div class="flex">
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                  </div>
                </div>
              </div>
        </nav>
    </header>



    <script src="./scripts/script.js"></script>
</body>

</html>
